<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Catalog Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  (function(){
    try {
      var s = JSON.parse(localStorage.getItem('search-ui-state'));
      var t = (s && s.theme) ? s.theme : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  })();
</script>
<style>
  :root {
    --navy: #0a1628;
    --navy-light: #122040;
    --navy-mid: #1a2d54;
    --slate: #2a3f5f;
    --gold: #f2b400;
    --gold-dim: #c49200;
    --gold-glow: rgba(242, 180, 0, 0.12);
    --cyan: #38bdf8;
    --cyan-dim: rgba(56, 189, 248, 0.15);
    --text: #e2e8f0;
    --text-dim: #8896ab;
    --text-muted: #5a6a80;
    --border: rgba(255,255,255,0.06);
    --danger: #f87171;
    --success: #34d399;
    --purple: #a78bfa;
    --radius: 8px;
    --font: 'DM Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  [data-theme="light"] {
    --navy: #f5f7fa;
    --navy-light: #ffffff;
    --navy-mid: #e8ecf1;
    --slate: #d1d8e0;
    --gold: #d4a000;
    --gold-dim: #b38600;
    --gold-glow: rgba(212, 160, 0, 0.10);
    --cyan: #0e7fad;
    --cyan-dim: rgba(14, 127, 173, 0.10);
    --text: #1a2332;
    --text-dim: #4a5568;
    --text-muted: #8896ab;
    --border: rgba(0,0,0,0.08);
    --danger: #dc2626;
    --success: #16a34a;
    --purple: #7c3aed;
    --radius: 8px;
  }

  /* ── Light themes ── */
  [data-theme="solarized"] {
    --navy: #fdf6e3;
    --navy-light: #eee8d5;
    --navy-mid: #e8e2cc;
    --slate: #d6d0bc;
    --gold: #b58900;
    --gold-dim: #8a6800;
    --gold-glow: rgba(181,137,0,0.12);
    --cyan: #268bd2;
    --cyan-dim: rgba(38,139,210,0.12);
    --text: #657b83;
    --text-dim: #586e75;
    --text-muted: #93a1a1;
    --border: rgba(0,0,0,0.08);
    --danger: #dc322f;
    --success: #859900;
    --purple: #6c71c4;
    --radius: 8px;
  }
  [data-theme="paper"] {
    --navy: #f8f9fc;
    --navy-light: #ffffff;
    --navy-mid: #eef1f6;
    --slate: #d8dde6;
    --gold: #2563eb;
    --gold-dim: #1d4ed8;
    --gold-glow: rgba(37,99,235,0.08);
    --cyan: #0891b2;
    --cyan-dim: rgba(8,145,178,0.10);
    --text: #0f172a;
    --text-dim: #334155;
    --text-muted: #64748b;
    --border: rgba(0,0,0,0.07);
    --danger: #dc2626;
    --success: #16a34a;
    --purple: #7c3aed;
    --radius: 8px;
  }
  [data-theme="rose"] {
    --navy: #fff5f7;
    --navy-light: #ffffff;
    --navy-mid: #fce7eb;
    --slate: #f4c2cc;
    --gold: #e11d48;
    --gold-dim: #be123c;
    --gold-glow: rgba(225,29,72,0.09);
    --cyan: #db2777;
    --cyan-dim: rgba(219,39,119,0.10);
    --text: #18181b;
    --text-dim: #52525b;
    --text-muted: #a1a1aa;
    --border: rgba(0,0,0,0.07);
    --danger: #b91c1c;
    --success: #15803d;
    --purple: #7c3aed;
    --radius: 8px;
  }
  [data-theme="forest"] {
    --navy: #f0fdf4;
    --navy-light: #ffffff;
    --navy-mid: #dcfce7;
    --slate: #bbf7d0;
    --gold: #16a34a;
    --gold-dim: #15803d;
    --gold-glow: rgba(22,163,74,0.10);
    --cyan: #0d9488;
    --cyan-dim: rgba(13,148,136,0.10);
    --text: #0f172a;
    --text-dim: #374151;
    --text-muted: #6b7280;
    --border: rgba(0,0,0,0.07);
    --danger: #dc2626;
    --success: #15803d;
    --purple: #7c3aed;
    --radius: 8px;
  }
  [data-theme="lavender"] {
    --navy: #f5f3ff;
    --navy-light: #ffffff;
    --navy-mid: #ede9fe;
    --slate: #ddd6fe;
    --gold: #7c3aed;
    --gold-dim: #6d28d9;
    --gold-glow: rgba(124,58,237,0.10);
    --cyan: #0891b2;
    --cyan-dim: rgba(8,145,178,0.10);
    --text: #0f172a;
    --text-dim: #334155;
    --text-muted: #64748b;
    --border: rgba(0,0,0,0.07);
    --danger: #dc2626;
    --success: #16a34a;
    --purple: #6d28d9;
    --radius: 8px;
  }

  /* ── Dark themes ── */
  [data-theme="midnight"] {
    --navy: #000000;
    --navy-light: #0d0d0d;
    --navy-mid: #161616;
    --slate: #222222;
    --gold: #f2b400;
    --gold-dim: #c49200;
    --gold-glow: rgba(242,180,0,0.12);
    --cyan: #38bdf8;
    --cyan-dim: rgba(56,189,248,0.12);
    --text: #ffffff;
    --text-dim: #a0a0a0;
    --text-muted: #555555;
    --border: rgba(255,255,255,0.08);
    --danger: #ff4444;
    --success: #22dd88;
    --purple: #b48ead;
    --radius: 8px;
  }
  [data-theme="one-dark"] {
    --navy: #21252b;
    --navy-light: #282c34;
    --navy-mid: #2c313a;
    --slate: #3e4451;
    --gold: #e5c07b;
    --gold-dim: #d19a66;
    --gold-glow: rgba(229,192,123,0.12);
    --cyan: #61afef;
    --cyan-dim: rgba(97,175,239,0.15);
    --text: #abb2bf;
    --text-dim: #7f848e;
    --text-muted: #4b5263;
    --border: rgba(255,255,255,0.06);
    --danger: #e06c75;
    --success: #98c379;
    --purple: #c678dd;
    --radius: 8px;
  }
  [data-theme="dracula"] {
    --navy: #191a21;
    --navy-light: #282a36;
    --navy-mid: #2e3048;
    --slate: #44475a;
    --gold: #ff79c6;
    --gold-dim: #ff5fad;
    --gold-glow: rgba(255,121,198,0.12);
    --cyan: #8be9fd;
    --cyan-dim: rgba(139,233,253,0.12);
    --text: #f8f8f2;
    --text-dim: #bdbdbd;
    --text-muted: #6272a4;
    --border: rgba(255,255,255,0.08);
    --danger: #ff5555;
    --success: #50fa7b;
    --purple: #bd93f9;
    --radius: 8px;
  }
  [data-theme="monokai"] {
    --navy: #1e1f1c;
    --navy-light: #272822;
    --navy-mid: #2d2e27;
    --slate: #3d3d35;
    --gold: #fd971f;
    --gold-dim: #e8870a;
    --gold-glow: rgba(253,151,31,0.12);
    --cyan: #66d9e8;
    --cyan-dim: rgba(102,217,232,0.12);
    --text: #f8f8f2;
    --text-dim: #cfcfc2;
    --text-muted: #75715e;
    --border: rgba(255,255,255,0.06);
    --danger: #f92672;
    --success: #a6e22e;
    --purple: #ae81ff;
    --radius: 8px;
  }
  [data-theme="nord"] {
    --navy: #242933;
    --navy-light: #2e3440;
    --navy-mid: #3b4252;
    --slate: #434c5e;
    --gold: #ebcb8b;
    --gold-dim: #d4aa68;
    --gold-glow: rgba(235,203,139,0.12);
    --cyan: #88c0d0;
    --cyan-dim: rgba(136,192,208,0.12);
    --text: #eceff4;
    --text-dim: #d8dee9;
    --text-muted: #4c566a;
    --border: rgba(255,255,255,0.06);
    --danger: #bf616a;
    --success: #a3be8c;
    --purple: #b48ead;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--navy); color: var(--text); min-height: 100vh; line-height: 1.5; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; background: var(--navy-light);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-logo {
    width: 32px; height: 32px; background: var(--gold); border-radius: 6px;
    display: grid; place-items: center; font-weight: 700; font-size: 16px; color: var(--navy);
  }
  .topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar h1 span { color: var(--gold); }
  .topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .boost-badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; cursor: default;
  }
  .boost-badge.on  { background: var(--gold-glow); color: var(--gold); border: 1px solid rgba(242,180,0,0.2); }
  .boost-badge.off { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border); }

  .source-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
  }
  .source-badge.collibra { background: rgba(27,106,201,0.15); color: #60a5fa; border: 1px solid rgba(27,106,201,0.25); }
  .source-badge.local    { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border); }

  .btn {
    font-family: var(--font); font-size: 13px; font-weight: 600;
    padding: 8px 18px; border-radius: var(--radius); border: none; cursor: pointer;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
  }
  .btn-secondary { background: var(--navy-mid); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--slate); }

  .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .toggle {
    width: 36px; height: 20px; background: var(--slate); border-radius: 10px;
    position: relative; cursor: pointer; transition: background 0.2s;
  }
  .toggle.on { background: var(--gold); }
  .toggle::after {
    content: ''; position: absolute; width: 16px; height: 16px; background: white;
    border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  .search-container { max-width: 1100px; margin: 0 auto; padding: 40px 32px 24px; }
  .search-box { position: relative; margin-bottom: 12px; }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .search-input {
    width: 100%; font-family: var(--font); font-size: 16px;
    padding: 14px 16px 14px 46px; background: var(--navy-light);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--gold); }
  .search-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text-muted); padding: 0 4px; min-height: 20px; margin-bottom: 8px;
  }

  /* ── Content Layout ── */
  .content-layout {
    max-width: 1100px; margin: 0 auto; padding: 0 32px 64px;
    display: flex; gap: 24px; align-items: flex-start;
  }
  .results-container { flex: 1; min-width: 0; }

  .result-card {
    background: var(--navy-light); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 22px; margin-bottom: 10px; transition: border-color 0.15s, transform 0.1s;
    cursor: pointer; position: relative;
  }
  .result-card:hover { border-color: rgba(242,180,0,0.2); transform: translateX(2px); }
  .result-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .result-title { font-size: 15px; font-weight: 600; color: var(--cyan); word-break: break-word; }
  .result-title a { color: inherit; text-decoration: none; }
  .result-title a:hover { text-decoration: underline; }

  .result-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .result-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-type   { background: var(--cyan-dim); color: var(--cyan); }
  .badge-status { background: rgba(168,139,250,0.12); color: #a78bfa; }
  .badge-boost  { background: var(--gold-glow); color: var(--gold); }

  .result-highlights { margin-top: 8px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .hl-row { padding: 3px 0; display: flex; gap: 8px; }
  .hl-field {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    min-width: 80px; flex-shrink: 0; padding-top: 2px;
  }
  .hl-fragment { flex: 1; word-break: break-word; }
  .hl-fragment strong { color: var(--gold); font-weight: 600; }

  .result-score {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    display: none; margin-top: -4px; margin-bottom: 6px;
  }
  .show-scores .result-score { display: block; }
  .boost-detail {
    margin-top: 6px; font-family: var(--mono); font-size: 10px;
    color: var(--text-muted); display: none;
  }
  .show-scores .boost-detail { display: block; }
  .boost-detail span { color: var(--gold); }

  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; }
  .page-btn {
    font-family: var(--font); font-size: 13px; font-weight: 500;
    padding: 6px 14px; background: var(--navy-light); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .page-btn:hover:not(:disabled) { background: var(--navy-mid); color: var(--text); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 12px; color: var(--text-muted); padding: 0 8px; }

  .loading-bar {
    height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    position: fixed; top: 65px; left: 0; right: 0;
    animation: slide 1s ease infinite; display: none; z-index: 200;
  }
  .loading-bar.active { display: block; }
  @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  .empty-state { text-align: center; padding: 64px 24px; color: var(--text-muted); }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; max-width: 360px; margin: 0 auto; }

  /* ── Facet Sidebar ── */
  .facet-bar {
    width: 210px; flex-shrink: 0;
    display: none; position: sticky; top: 74px;
  }
  .facet-bar.active { display: block; }
  .facet-sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .facet-sidebar-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted);
  }
  .facet-active-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .facet-chip {
    font-family: var(--font); font-size: 11px; font-weight: 600;
    padding: 3px 7px; border-radius: 4px;
    background: var(--gold-glow); color: var(--gold); border: 1px solid rgba(242,180,0,0.2);
    cursor: pointer; display: inline-flex; align-items: center; gap: 3px;
    transition: all 0.15s;
  }
  .facet-chip:hover { background: rgba(242,180,0,0.2); }
  .facet-chip .chip-x { font-size: 13px; line-height: 1; }
  .facet-clear {
    font-family: var(--font); font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 4px; border: none;
    background: rgba(248,113,113,0.12); color: var(--danger); cursor: pointer;
    transition: all 0.15s; display: block; width: 100%; margin-top: 2px; text-align: left;
  }
  .facet-clear:hover { background: rgba(248,113,113,0.2); }
  .facet-groups { display: flex; flex-direction: column; }
  .facet-group { margin-bottom: 16px; }
  .facet-group-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .facet-filter-input {
    width: 100%; font-family: var(--font); font-size: 11px;
    padding: 4px 8px; margin-bottom: 6px;
    background: var(--navy); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); outline: none;
  }
  .facet-filter-input::placeholder { color: var(--text-muted); }
  .facet-filter-input:focus { border-color: var(--gold); }
  .facet-option {
    display: flex; align-items: center; gap: 6px; padding: 3px 0;
    font-size: 12px; color: var(--text-dim); cursor: pointer; transition: color 0.1s;
  }
  .facet-option.facet-hidden { display: none; }
  .facet-show-more {
    font-family: var(--font); font-size: 11px; font-weight: 600;
    color: var(--cyan); background: none; border: none; cursor: pointer;
    padding: 4px 0; transition: color 0.15s;
  }
  .facet-show-more:hover { color: var(--gold); }
  .facet-option:hover { color: var(--text); }
  .facet-option input[type="checkbox"] {
    accent-color: var(--gold); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0;
  }
  .facet-option-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .facet-option-count {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    background: rgba(255,255,255,0.04); padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
  }

  /* ── Theme Picker ── */
  .theme-picker { position: relative; }
  .theme-picker__btn {
    font-family: var(--font); font-size: 12px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius);
    background: var(--navy-mid); color: var(--text-dim);
    border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
  }
  .theme-picker__btn:hover { background: var(--slate); color: var(--text); }
  .theme-picker__chevron { transition: transform 0.15s; flex-shrink: 0; }
  .theme-picker__btn[aria-expanded="true"] .theme-picker__chevron { transform: rotate(180deg); }
  .theme-picker__menu {
    position: absolute; right: 0; top: calc(100% + 6px);
    background: var(--navy-light); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    list-style: none; padding: 6px; min-width: 158px;
    display: none; z-index: 200; max-height: 360px; overflow-y: auto;
  }
  .theme-picker__menu.is-open { display: block; }
  .theme-picker__menu button {
    font-family: var(--font); font-size: 12px; font-weight: 500;
    display: block; width: 100%; text-align: left;
    padding: 7px 10px; border: none; border-radius: 5px;
    background: none; color: var(--text-dim); cursor: pointer; transition: all 0.1s;
  }
  .theme-picker__menu button:hover { background: var(--navy-mid); color: var(--text); }
  .theme-picker__menu button[aria-selected="true"] { color: var(--gold); background: var(--gold-glow); }
  .theme-picker__sep { height: 1px; background: var(--border); margin: 4px 0; }
  .theme-picker__group-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); padding: 6px 10px 2px; display: block;
  }

  @media (max-width: 768px) {
    .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .search-container { padding-left: 16px; padding-right: 16px; }
    .content-layout { flex-direction: column; padding: 0 16px 64px; gap: 12px; }
    .facet-bar { width: 100%; position: static; }
    .facet-groups { flex-direction: row; flex-wrap: wrap; gap: 12px; }
    .facet-group { min-width: 140px; flex: 1; margin-bottom: 0; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">S</div>
    <h1>Data Catalog <span>Search</span></h1>
  </div>
  <div class="topbar-right">
    <span id="boostBadge" class="boost-badge off">Boosts: Off</span>
    <span id="sourceBadge" class="source-badge local">Config: local</span>
    <div class="toggle-wrap">
      <span>Boost</span>
      <div id="boostToggle" class="toggle" onclick="toggleBoost()"></div>
    </div>
    <div class="toggle-wrap" style="margin-left:4px">
      <span>Scores</span>
      <div id="scoreToggle" class="toggle" onclick="toggleScores()"></div>
    </div>
    <div class="theme-picker" id="themePicker">
      <button class="theme-picker__btn" id="themePickerBtn" aria-haspopup="listbox" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/><circle cx="7.5" cy="10.5" r=".75" fill="currentColor" stroke="none"/><circle cx="12" cy="7.5" r=".75" fill="currentColor" stroke="none"/><circle cx="16.5" cy="10.5" r=".75" fill="currentColor" stroke="none"/></svg>
        <span id="themePickerLabel">Dark</span>
        <svg class="theme-picker__chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <ul class="theme-picker__menu" id="themePickerMenu" role="listbox" aria-label="Theme">
        <li class="theme-picker__group-label">Light</li>
        <li><button role="option" data-value="light">Light</button></li>
        <li><button role="option" data-value="solarized">Solarized</button></li>
        <li><button role="option" data-value="paper">Paper</button></li>
        <li><button role="option" data-value="rose">Rosé</button></li>
        <li><button role="option" data-value="forest">Forest</button></li>
        <li><button role="option" data-value="lavender">Lavender</button></li>
        <li class="theme-picker__sep" role="separator" aria-hidden="true"></li>
        <li class="theme-picker__group-label">Dark</li>
        <li><button role="option" data-value="dark">Dark</button></li>
        <li><button role="option" data-value="midnight">Midnight</button></li>
        <li><button role="option" data-value="one-dark">One Dark</button></li>
        <li><button role="option" data-value="dracula">Dracula</button></li>
        <li><button role="option" data-value="monokai">Monokai</button></li>
        <li><button role="option" data-value="nord">Nord</button></li>

</div>

<div class="search-container">
  <div class="search-box">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" class="search-input" type="text" placeholder="Search the data catalog&hellip;" autocomplete="off">
  </div>
  <div class="search-meta">
    <span id="resultsMeta"></span>
    <span id="boostInfo"></span>
  </div>
</div>

<div class="content-layout">
  <!-- Facet sidebar -->
  <div class="facet-bar" id="facetBar">
    <div class="facet-sidebar-header">
      <span class="facet-sidebar-title">Filters</span>
    </div>
    <div class="facet-active-chips" id="facetChips"></div>
    <div class="facet-groups" id="facetGroups"></div>
  </div>

  <div class="results-container" id="resultsContainer">
    <div class="empty-state">
      <div class="big">&#128269;</div>
      <p>Type a keyword to search across assets, descriptions, and attributes in the catalog.</p>
    </div>
  </div>
</div>

<script>
const BASE_URL = window.location.origin;
const STORAGE_KEY = 'collibra-search-boosts';
const PAGE_SIZE = 50;
const MAX_RESULTS = 500; // max results fetched from server for client-side filtering/pagination

// Collibra config location constants
const COMMUNITY_NAME = 'Collibra Configuration Settings';
const DOMAIN_NAME = 'Collibra Configuration Glossary';
const ASSET_NAME = 'Search Settings';
const DEFINITION_ATTR_TYPE_ID = '00000000-0000-0000-0000-000000000202';

let csrfToken = null;
let boostEnabled = true;
let showScores = false;
let currentQuery = '';
let currentPage = 0;
let totalResults = 0;
let allResults = [];
let attrValueMap = {};
let boostConfig = { assetTypes: {}, statuses: {}, attributeTypes: {} };
let configSource = 'local'; // 'collibra' or 'local'
let activeFilters = { type: new Set(), status: new Set(), domain: new Set(), community: new Set() };
let facetPanelOpen = false;
const FACET_LIMIT = 10;
let facetExpanded = {};

// ── Init ──
(async function() {
  // Fetch CSRF
  try {
    const res = await fetch(`${BASE_URL}/rest/2.0/auth/sessions/current?include=csrfToken`, { credentials: 'include' });
    const data = await res.json();
    csrfToken = data.csrfToken;
  } catch (e) { console.warn('CSRF fetch failed:', e); }

  // Restore UI toggles
  const saved = localStorage.getItem('search-ui-state');
  if (saved) try { const s = JSON.parse(saved); boostEnabled = s.boostEnabled ?? true; showScores = s.showScores ?? false; } catch {}
  syncToggles();
  initThemePicker();

  // Load boost config — try Collibra first, fall back to localStorage
  await loadBoostConfig();

  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  document.getElementById('searchInput').focus();
})();

// ── Load boost config ──
async function loadBoostConfig() {
  // Try Collibra
  try {
    const commRes = await apiGet(`communities?name=${encodeURIComponent(COMMUNITY_NAME)}&nameMatchMode=EXACT&limit=1`);
    const comm = (commRes.results || [])[0];
    if (comm) {
      const domRes = await apiGet(`domains?name=${encodeURIComponent(DOMAIN_NAME)}&nameMatchMode=EXACT&communityId=${comm.id}&limit=1`);
      const dom = (domRes.results || [])[0];
      if (dom) {
        const assetRes = await apiGet(`assets?name=${encodeURIComponent(ASSET_NAME)}&nameMatchMode=EXACT&domainId=${dom.id}&limit=1`);
        const asset = (assetRes.results || [])[0];
        if (asset) {
          const attrRes = await apiGet(`attributes?assetId=${asset.id}&typeId=${DEFINITION_ATTR_TYPE_ID}&limit=1`);
          const attr = (attrRes.results || [])[0];
          if (attr?.value) {
            boostConfig = JSON.parse(attr.value);
            configSource = 'collibra';
            // Also cache locally
            localStorage.setItem(STORAGE_KEY, JSON.stringify(boostConfig));
            updateSourceBadge();
            console.log('Boost config loaded from Collibra');
            return;
          }
        }
      }
    }
  } catch (e) {
    console.warn('Collibra config load failed, falling back to local:', e);
  }

  // Fall back to localStorage
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (raw) {
      // Migrate old format
      if (raw.attributeTypes) {
        for (const [k, v] of Object.entries(raw.attributeTypes)) {
          if (typeof v === 'number') raw.attributeTypes[k] = { resourceType: 'unknown', rules: { '__presence__': v } };
        }
      }
      boostConfig = raw;
    }
  } catch {}
  configSource = 'local';
  updateSourceBadge();
}

async function apiGet(path) {
  const res = await fetch(`${BASE_URL}/rest/2.0/${path}`, { credentials: 'include' });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

function updateSourceBadge() {
  const el = document.getElementById('sourceBadge');
  if (configSource === 'collibra') {
    el.className = 'source-badge collibra';
    el.textContent = 'Config: Collibra';
  } else {
    el.className = 'source-badge local';
    el.textContent = 'Config: local';
  }
}

// ── Toggles ──
function toggleBoost() {
  boostEnabled = !boostEnabled;
  syncToggles();
  saveUI();
  if (currentQuery) {
    doSearch();
    return;
  }
  if (allResults.length) renderResults();
}
function toggleScores() { showScores = !showScores; syncToggles(); saveUI(); }
function syncToggles() {
  document.getElementById('boostToggle').classList.toggle('on', boostEnabled);
  document.getElementById('scoreToggle').classList.toggle('on', showScores);
  const bb = document.getElementById('boostBadge');
  bb.className = `boost-badge ${boostEnabled?'on':'off'}`;
  bb.textContent = boostEnabled ? 'Boosts: On' : 'Boosts: Off';
  document.getElementById('resultsContainer').classList.toggle('show-scores', showScores);
}
function saveUI() { localStorage.setItem('search-ui-state', JSON.stringify({ boostEnabled, showScores, theme: document.documentElement.getAttribute('data-theme') || 'dark' })); }

const THEME_LABELS = {
  'light':'Light','solarized':'Solarized','paper':'Paper','rose':'Rosé','forest':'Forest','lavender':'Lavender',
  'dark':'Dark','midnight':'Midnight','one-dark':'One Dark','dracula':'Dracula','monokai':'Monokai','nord':'Nord'
};
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const lbl = document.getElementById('themePickerLabel');
  if (lbl) lbl.textContent = THEME_LABELS[theme] || theme;
  const menu = document.getElementById('themePickerMenu');
  if (menu) menu.querySelectorAll('[role="option"]').forEach(b => b.setAttribute('aria-selected', String(b.dataset.value === theme)));
  saveUI();
}
function initThemePicker() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(currentTheme);
  const btn = document.getElementById('themePickerBtn');
  const menu = document.getElementById('themePickerMenu');
  if (!btn || !menu) return;
  function closeMenu() { menu.classList.remove('is-open'); btn.setAttribute('aria-expanded', 'false'); }
  btn.addEventListener('click', e => { e.stopPropagation(); const open = menu.classList.toggle('is-open'); btn.setAttribute('aria-expanded', String(open)); });
  menu.querySelectorAll('[role="option"]').forEach(opt => {
    opt.addEventListener('click', () => { applyTheme(opt.dataset.value); closeMenu(); });
  });
  document.addEventListener('click', closeMenu);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
}

// ── Fetch attribute values for result assets ──
async function fetchAttributeValues(assetIds, config) {
  attrValueMap = {};
  const attrTypeIds = Object.keys(config.attributeTypes || {});
  if (!attrTypeIds.length || !assetIds.length) return;
  const fetches = attrTypeIds.map(async (typeId) => {
    const assetParams = assetIds.map(id => `assetId=${encodeURIComponent(id)}`).join('&');
    const url = `${BASE_URL}/rest/2.0/attributes?typeId=${encodeURIComponent(typeId)}&${assetParams}&offset=0&limit=${assetIds.length * 2}`;
    try {
      const res = await fetch(url, { credentials: 'include' });
      if (!res.ok) return;
      const data = await res.json();
      for (const attr of (data.results || [])) {
        const aid = attr.asset?.id; if (!aid) continue;
        if (!attrValueMap[aid]) attrValueMap[aid] = {};
        if (!attrValueMap[aid][typeId]) attrValueMap[aid][typeId] = [];
        attrValueMap[aid][typeId].push(attr.value);
      }
    } catch (e) { console.warn(`Attr fetch failed for ${typeId}:`, e); }
  });
  await Promise.all(fetches);
}

// ── Compute boost multiplier ──
function computeMultiplier(result, config) {
  let mult = 1.0;
  const res = result.resource;
  const tb = config.assetTypes?.[res.type?.id];
  if (tb !== undefined) mult *= tb;
  const sb = config.statuses?.[res.status?.id];
  if (sb !== undefined) mult *= sb;

  const assetAttrs = attrValueMap[res.id] || {};
  for (const [attrTypeId, attrConfig] of Object.entries(config.attributeTypes || {})) {
    const rules = attrConfig.rules || {};
    const values = assetAttrs[attrTypeId];
    if (rules['__presence__'] !== undefined) {
      if (values?.length) mult *= rules['__presence__'];
      continue;
    }
    if (!values?.length) continue;
    for (const actualVal of values) {
      const nv = String(actualVal).toLowerCase();
      for (const [rk, rb] of Object.entries(rules)) {
        if (rb === 1.0) continue;
        if (rk === 'true' || rk === 'false') {
          const bv = (actualVal === true || nv === 'true');
          if ((rk === 'true' && bv) || (rk === 'false' && !bv)) mult *= rb;
        } else if (nv === rk.toLowerCase()) mult *= rb;
      }
    }
  }
  return mult;
}

function boostBreakdown(result, config) {
  const parts = [];
  const res = result.resource;
  const tb = config.assetTypes?.[res.type?.id];
  if (tb !== undefined && tb !== 1.0) parts.push(`type:${res.type.name}=×${tb}`);
  const sb = config.statuses?.[res.status?.id];
  if (sb !== undefined && sb !== 1.0) parts.push(`status:${res.status.name}=×${sb}`);
  const assetAttrs = attrValueMap[res.id] || {};
  for (const [attrTypeId, attrConfig] of Object.entries(config.attributeTypes || {})) {
    const rules = attrConfig.rules || {};
    const values = assetAttrs[attrTypeId];
    if (rules['__presence__'] !== undefined && values?.length) {
      parts.push(`has-attr:${attrTypeId.substring(0,8)}=×${rules['__presence__']}`);
      continue;
    }
    if (!values) continue;
    for (const v of values) {
      const nv = String(v).toLowerCase();
      for (const [rk, rb] of Object.entries(rules)) {
        if (rb === 1.0) continue;
        if ((rk === 'true' || rk === 'false')) {
          const bv = (v === true || nv === 'true');
          if ((rk === 'true' && bv) || (rk === 'false' && !bv)) parts.push(`${rk}=×${rb}`);
        } else if (nv === rk.toLowerCase()) parts.push(`val:${rk}=×${rb}`);
      }
    }
  }
  return parts;
}

// ── Search ──
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  currentQuery = query; currentPage = 0;
  document.getElementById('loadingBar').classList.add('active');

  const payload = {
    keywords: query,
    searchInFields: [{ resourceType: "Asset", fields: ["displayName","name","attributes","StringAttribute:00000000-0000-0000-0000-000000007022", "attributes", "displayName", "comments", "tags", "dataClassification"] }],
    sortField: "RELEVANCE", sortOrder: "DESC",
    highlights: { preTag: "<strong>", postTag: "</strong>" },
    limit: MAX_RESULTS, offset: 0
  };
  const headers = { 'Content-Type': 'application/json' };
  if (csrfToken) headers['X-CSRF-TOKEN'] = csrfToken;

  try {
    const res = await fetch(`${BASE_URL}/rest/2.0/search`, {
      method: 'POST', credentials: 'include', headers, body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();
    totalResults = data.total || 0;
    allResults = data.results || [];

    if (boostEnabled) {
      const assetIds = allResults.map(r => r.resource?.id).filter(Boolean);
      await fetchAttributeValues(assetIds, boostConfig);
    }
    activeFilters = { type: new Set(), status: new Set(), domain: new Set(), community: new Set() };
    buildFacets();
    renderResults();
  } catch (err) {
    document.getElementById('resultsContainer').innerHTML =
      `<div class="empty-state" style="color:var(--danger)"><div class="big">&#9888;</div><p>${esc(err.message)}<br>Make sure you are logged into Collibra.</p></div>`;
    document.getElementById('resultsMeta').textContent = '';
  } finally { document.getElementById('loadingBar').classList.remove('active'); }
}

// ── Render ──
function renderResults() {
  const container = document.getElementById('resultsContainer');
  const meta = document.getElementById('resultsMeta');
  const info = document.getElementById('boostInfo');

  if (!allResults.length) {
    container.innerHTML = '<div class="empty-state"><div class="big">&#128528;</div><p>No results found.</p></div>';
    meta.textContent = `0 results for "${currentQuery}"`;
    info.textContent = '';
    document.getElementById('facetBar').classList.remove('active');
    return;
  }

  const filtered = applyFacetFilters(allResults);

  let scored = filtered.map((r, i) => {
    const base = 1000 - i;
    const mult = boostEnabled ? computeMultiplier(r, boostConfig) : 1.0;
    const bd = boostEnabled ? boostBreakdown(r, boostConfig) : [];
    return { ...r, _score: base * mult, _mult: mult, _breakdown: bd };
  });
  scored.sort((a, b) => b._score - a._score);

  const boostCount = scored.filter(r => r._mult !== 1.0).length;
  const fetchedNote = allResults.length < totalResults ? ` (top ${allResults.length.toLocaleString()} of ${totalResults.toLocaleString()})` : '';
  const filterNote = filtered.length < allResults.length ? ` \u00b7 ${filtered.length} after filters` : '';
  const pageStart = currentPage * PAGE_SIZE;
  const pageEnd = Math.min(pageStart + PAGE_SIZE, scored.length);
  meta.textContent = `${totalResults.toLocaleString()} results for "${currentQuery}"${fetchedNote}${filterNote} \u00b7 showing ${scored.length ? pageStart+1 : 0}\u2013${pageEnd}`;
  info.textContent = boostEnabled && boostCount ? `${boostCount} result${boostCount>1?'s':''} boosted` : '';

  const pageSlice = scored.slice(pageStart, pageEnd);
  const cards = pageSlice.map(r => {
    const res = r.resource;
    const name = (res.displayName||res.name||'').replace(/---https?:\/\/.+$/,'').trim()||res.name;
    const url = `${BASE_URL}/asset/${res.id}`;
    const typeName = res.type?.name||'';
    const statusName = res.status?.name||'';
    const boostLabel = r._mult!==1.0 ? `<span class="result-badge badge-boost">${r._mult>1?'+':''}${((r._mult-1)*100).toFixed(0)}%</span>` : '';

    const seen = new Set();
    const hlRows = (r.highlights||[]).filter(h => { const f=h.fragment.replace(/<\/?strong>/g,''); if(seen.has(f))return false; seen.add(f); return true; })
      .slice(0,4).map(h => `<div class="hl-row"><span class="hl-field">${esc(friendlyField(h.field))}</span><span class="hl-fragment">${h.fragment}</span></div>`).join('');

    const bdHtml = r._breakdown.length ? `<div class="boost-detail">Boosts: ${r._breakdown.map(b=>`<span>${esc(b)}</span>`).join(' &middot; ')}</div>` : '';

    return `<div class="result-card" onclick="if(event.target.tagName!=='A')window.open('${url}','_blank')">
      <div class="result-header">
        <div class="result-title"><a href="${url}" target="_blank" onclick="event.stopPropagation()">${esc(name)}</a></div>
        <div class="result-badges">
          ${typeName?`<span class="result-badge badge-type">${esc(typeName)}</span>`:''}
          ${statusName?`<span class="result-badge badge-status">${esc(statusName)}</span>`:''}
          ${boostLabel}
        </div>
      </div>
      <div class="result-score">score: ${r._score.toFixed(1)} (\u00d7${r._mult.toFixed(2)})</div>
      ${hlRows?`<div class="result-highlights">${hlRows}</div>`:''}
      ${bdHtml}
    </div>`;
  }).join('');

  const totalPages = Math.ceil(scored.length / PAGE_SIZE);
  const curPage = currentPage + 1;
  const pag = totalPages>1 ? `<div class="pagination">
    <button class="page-btn" ${curPage<=1?'disabled':''} onclick="goToPage(${currentPage-1})">&#8592; Prev</button>
    <span class="page-info">Page ${curPage} of ${totalPages}</span>
    <button class="page-btn" ${curPage>=totalPages?'disabled':''} onclick="goToPage(${currentPage+1})">Next &#8594;</button>
  </div>` : '';

  container.innerHTML = scored.length ? cards + pag : '<div class="empty-state"><div class="big">&#128528;</div><p>No results match the current filters.</p></div>';
}

function friendlyField(f) {
  if (f==='name') return 'Name';
  if (f==='displayName') return 'Display';
  if (f.startsWith('attribute:')) return 'Attribute';
  return f;
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── Faceted Filters ──
function buildFacets() {
  const facets = { type: {}, status: {}, domain: {}, community: {} };
  for (const r of allResults) {
    const res = r.resource;
    const typeName = res.type?.name;
    if (typeName) facets.type[typeName] = (facets.type[typeName] || 0) + 1;
    const statusName = res.status?.name;
    if (statusName) facets.status[statusName] = (facets.status[statusName] || 0) + 1;
    const domainName = res.domain?.name;
    if (domainName) facets.domain[domainName] = (facets.domain[domainName] || 0) + 1;
    const commName = res.domain?.community?.name || res.community?.name;
    if (commName) facets.community[commName] = (facets.community[commName] || 0) + 1;
  }

  const bar = document.getElementById('facetBar');
  const groups = document.getElementById('facetGroups');
  const hasAny = Object.values(facets).some(f => Object.keys(f).length > 0);
  bar.classList.toggle('active', hasAny && allResults.length > 0);
  if (!hasAny) return;

  const labels = { type: 'Asset Type', status: 'Status', domain: 'Domain', community: 'Community' };
  groups.innerHTML = Object.entries(facets)
    .filter(([, vals]) => Object.keys(vals).length > 0)
    .map(([key, vals]) => {
      const sorted = Object.entries(vals).sort((a, b) => b[1] - a[1]);
      const isExpanded = facetExpanded[key];
      const showFilter = sorted.length > FACET_LIMIT;
      return `<div class="facet-group" data-facet-key="${key}">
        <div class="facet-group-title">${labels[key]}</div>
        ${showFilter ? `<input type="text" class="facet-filter-input" placeholder="Filter ${labels[key].toLowerCase()}\u2026" oninput="filterFacetGroup('${key}', this.value)">` : ''}
        ${sorted.map(([name, count], i) => {
          const checked = activeFilters[key].has(name) ? 'checked' : '';
          const hidden = !isExpanded && i >= FACET_LIMIT && !checked ? 'facet-hidden' : '';
          const id = `facet-${key}-${name.replace(/[^a-zA-Z0-9]/g, '_')}`;
          return `<label class="facet-option ${hidden}" for="${id}" title="${esc(name)}" data-facet-name="${esc(name.toLowerCase())}">
            <input type="checkbox" id="${id}" ${checked}
              onchange="onFacetChange('${key}', '${name.replace(/'/g, "\\'")}', this.checked)">
            <span class="facet-option-label">${esc(name)}</span>
            <span class="facet-option-count">${count}</span>
          </label>`;
        }).join('')}
        ${sorted.length > FACET_LIMIT && !isExpanded ? `<button class="facet-show-more" onclick="expandFacetGroup('${key}')">Show ${sorted.length - FACET_LIMIT} more\u2026</button>` : ''}
      </div>`;
    }).join('');
  renderFacetChips();
}

function onFacetChange(category, value, checked) {
  if (checked) activeFilters[category].add(value);
  else activeFilters[category].delete(value);
  currentPage = 0;
  renderFacetChips();
  renderResults();
}

function removeFacet(category, value) {
  activeFilters[category].delete(value);
  const safeId = `facet-${category}-${value.replace(/[^a-zA-Z0-9]/g, '_')}`;
  const cb = document.getElementById(safeId);
  if (cb) cb.checked = false;
  currentPage = 0;
  renderFacetChips();
  renderResults();
}

function clearAllFacets() {
  for (const k of Object.keys(activeFilters)) activeFilters[k].clear();
  document.querySelectorAll('#facetGroups input[type="checkbox"]').forEach(c => c.checked = false);
  currentPage = 0;
  renderFacetChips();
  renderResults();
}

function renderFacetChips() {
  const chips = document.getElementById('facetChips');
  const labels = { type: 'Type', status: 'Status', domain: 'Domain', community: 'Community' };
  const allChips = [];
  for (const [cat, vals] of Object.entries(activeFilters)) {
    for (const v of vals) {
      allChips.push(`<span class="facet-chip" onclick="removeFacet('${cat}','${v.replace(/'/g, "\\\'")}')" title="${labels[cat]}: ${esc(v)}">${labels[cat]}: ${esc(v)} <span class="chip-x">&times;</span></span>`);
    }
  }
  if (allChips.length) allChips.push(`<button class="facet-clear" onclick="clearAllFacets()">Clear all</button>`);
  chips.innerHTML = allChips.join('');

}

function filterFacetGroup(key, query) {
  const q = query.toLowerCase();

  if (!group) return;
  const options = group.querySelectorAll('.facet-option');
  let visibleCount = 0;
  options.forEach(opt => {
    const name = opt.dataset.facetName || '';
    const matches = !q || name.includes(q);
    if (q) {
      opt.classList.toggle('facet-hidden', !matches);
    } else {
      const i = Array.from(options).indexOf(opt);
      const checked = opt.querySelector('input')?.checked;
      opt.classList.toggle('facet-hidden', !facetExpanded[key] && i >= FACET_LIMIT && !checked);
    }
  });
  const btn = group.querySelector('.facet-show-more');
  if (btn) btn.style.display = q ? 'none' : '';
}

function goToPage(page) {

  renderResults();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFacetFilters(results) {
  return results.filter(r => {
    const res = r.resource;
    if (activeFilters.type.size && !activeFilters.type.has(res.type?.name)) return false;
    if (activeFilters.status.size && !activeFilters.status.has(res.status?.name)) return false;
    if (activeFilters.domain.size && !activeFilters.domain.has(res.domain?.name)) return false;
    if (activeFilters.community.size) {
      const cName = res.domain?.community?.name || res.community?.name;
      if (!activeFilters.community.has(cName)) return false;
    }
    return true;
  });
}
